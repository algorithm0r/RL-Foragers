<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RLLayers</title>
  <style>
    body { margin: 0; background: #11151c; color: #cdd2da; font-family: system-ui, sans-serif; display: flex; align-items: flex-start; }
    #controlPanel { width: 240px; padding: 14px; box-sizing: border-box; flex: none; }
    #controlPanel h3 { margin: 0 0 10px; }
    .ctl { display: block; margin: 9px 0; font-size: 13px; }
    .ctl input[type=range] { width: 100%; }
    .ctl-check { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
    .ctl-check input { width: auto; }
    .ctl-group { margin: 0 0 4px; }
    .ctl-group[open] { padding-bottom: 8px; border-bottom: 1px solid #21262d; margin-bottom: 8px; }
    .ctl-group > summary { cursor: pointer; user-select: none; list-style: none; padding: 7px 0 3px;
      font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #8a8f98; }
    .ctl-group > summary::-webkit-details-marker { display: none; }
    .ctl-group > summary::before { content: '▸'; color: #5a5f68; display: inline-block; width: 14px; }
    .ctl-group[open] > summary::before { content: '▾'; }
    button { background: #2b6cf6; color: #fff; border: 0; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    #tabs { display: flex; gap: 3px; margin-bottom: 10px; }
    .tab { flex: 1; background: #1b2029; color: #8a8f98; border: 1px solid #2b3240; border-radius: 6px 6px 0 0; padding: 7px 4px; font-size: 12px; }
    .tab.active { background: #2b6cf6; color: #fff; border-color: #2b6cf6; }
    .restart { font-size: 11px; padding: 4px 10px; margin-bottom: 12px; background: #333a47; }
    #status { font-size: 12px; color: #8a8f98; margin-top: 12px; }
    canvas { background: #0b0e13; display: block; }
    #dataPanel { padding: 14px; box-sizing: border-box; flex: none; }
    #stats { margin: 0 0 12px; font: 13px/1.5 'Consolas', 'Courier New', monospace; color: #cdd2da; white-space: pre; }
    #graphCanvas { border: 1px solid #222; }
    #qCanvas, #q3Canvas { border: 1px solid #222; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h3>RLLayers</h3>
    <div id="tabs">
      <button id="tab-sim" class="tab active" onclick="selectTab('sim')">Sim</button>
      <button id="tab-evo" class="tab" onclick="selectTab('evo')">Evolution</button>
      <button id="tab-eco" class="tab" onclick="selectTab('eco')">Ecology</button>
    </div>
    <div id="status"></div>
    <button class="restart" onclick="selectTab(currentTab)">Restart run</button>
    <div id="panel-sim"></div>
    <div id="panel-evo"></div>
    <div id="panel-eco"></div>
  </div>
  <canvas id="gameWorld" width="600" height="600"></canvas>
  <div id="dataPanel">
    <div id="stats"></div>
    <canvas id="graphCanvas" width="352" height="120"></canvas>
    <canvas id="qCanvas" width="352" height="208"></canvas>
    <canvas id="q3Canvas" width="352" height="208"></canvas>
  </div>

  <!-- socket.io client (for the standard DB client in socket mode) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- sim core, in dependency order; main.js last -->
  <script src="src/util.js"></script>
  <script src="src/params.js"></script>
  <script src="src/db.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/qlearner.js"></script>
  <script src="src/utree.js"></script>
  <script src="src/dqn.js"></script>
  <script src="src/agent.js"></script>
  <script src="src/world.js"></script>
  <script src="src/evolution.js"></script>
  <script src="src/ecology.js"></script>
  <script src="src/observer.js"></script>
  <script src="src/charts.js"></script>
  <script src="src/histogram.js"></script>
  <script src="src/datamanager.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
